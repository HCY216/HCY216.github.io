<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Version 6</title>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
</head>
<body>
    <h1>Welcome to HCY216</h1>
    <script>
        // Initialize LIFF
        function initLiff(liffId) {
            liff.init({ liffId: liffId }).then(() => {
                if (liff.isLoggedIn()) {
                    // User is logged in
                    handleLoggedIn();
                } else {
                    // User is not logged in
                    liff.login();
                }
            }).catch((err) => {
                console.error('LIFF Initialization failed', err);
            });
        }

        function handleLoggedIn() {
            // Example of using event listeners after login
            document.getElementById('someButton').addEventListener('click', function() {
                alert('Button clicked!');
            });
            // Other event listeners or functionality can go here
        }

        // Replace with your actual LIFF ID
        initLiff('YOUR_LIFF_ID');
    </script>
    <button id="someButton">Click Me!</button>
</body>
</html>
